services:

  # ── Application (FrankenPHP) ─────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "mysql://app:app_password@database:3306/mini_glpi?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - app_var:/app/var

  # ── Base de données (MySQL 8) ────────────────────────────────────────────────
  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mini_glpi
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  app_var:
